<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="triangle()">Kiểm tra tam giác</button>
    <script>
        function triangletype(a, b, c) {
            if (a == b && b == c) {
                document.write("Đây là tam giác đều");
            }
            else if (a == b || b == c || a == c) {
                document.write("Đây là tam giác cân");
            }
            else if (a * a + b * b == c * c && a == b ||
                a * a + c * c == b * b && a == c ||
                b * b + c * c == a * a && b == c) {
                document.write("Đây là tam giác vuông cân");
            }
            else {
                document.write("Đây là tam giác thường");
            }
        }

        function triangle() {
            let a = parseInt(prompt("Nhập giá trị cạnh a"));
            let b = parseInt(prompt("Nhập giá trị cạnh b"));
            let c = parseInt(prompt("Nhập giá trị cạnh c"));

            if (a + b > c || a + c > b || b + c > a) {
                alert("Đây là 3 cạnh của tam giác")
                triangletype(a, b, c)
            }
            else {
                alert("Đây không phải 3 cạnh của tam giác")
            }
        }
    </script>
</body>

</html>
