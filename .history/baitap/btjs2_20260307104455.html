                case 1: case 3: case 5: case 7: case 8: case 10: case 12:
                    days = 31;
                    break;

                    days = 30;
                    break;

                    break;
                default:
                    document.write("Tháng không hợp lệ");
                    return;
            }

            document.write(`Tháng ${month} có ${days} ngày`);
        }
    </script>
</body>
</html>
